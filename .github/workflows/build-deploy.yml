# Reusable workflow: data repos call this to build & deploy their chronicle.
#
# Minimal caller (in your data repo, .github/workflows/deploy.yml):
#
#   name: Deploy
#   on:
#     push: { branches: [main] }
#     workflow_dispatch:
#   permissions: { contents: read, pages: write, id-token: write }
#   jobs:
#     chronicle:
#       uses: mhb8898/boardgame-chronicle/.github/workflows/build-deploy.yml@main
#       # Pin a version for stability:
#       # with: { engine-ref: v1 }
#
# Prefer composing your own workflow? Use the action directly:
#   uses: mhb8898/boardgame-chronicle@v1   (see action.yml)

name: Build & Deploy Chronicle

on:
  workflow_call:
    inputs:
      engine-ref:
        description: Git ref of the engine to build with (tag, branch, or SHA)
        type: string
        default: main
      data-ref:
        # For issue-triggered callers (log-issue.yml) the event SHA predates
        # the session commit — pass the branch name to build its current head.
        description: Git ref of the data repo to build (defaults to the triggering SHA)
        type: string
        default: ''

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout engine
        uses: actions/checkout@v4
        with:
          repository: mhb8898/boardgame-chronicle
          ref: ${{ inputs.engine-ref }}

      - name: Checkout data repo
        uses: actions/checkout@v4
        with:
          path: site-data
          ref: ${{ inputs.data-ref }}

      # The engine checkout at the workspace root is also the composite
      # action (action.yml), so the engine-ref input picks the action version.
      - name: Build chronicle
        uses: ./
        with:
          data-path: site-data

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
